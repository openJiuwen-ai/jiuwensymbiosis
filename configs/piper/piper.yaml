# Piper 真机配置（硬件 + 模型 + 检测器）—— 与具体任务无关。
#
# 只描述"这台机器人"：机械臂/CAN、腕部相机、标定、工作空间、夹爪、LLM 端点、
# 开放词表检测器。**不含任何具体任务**——要做什么由用户运行时用 --query 或 --voice
# 给出，编译器据此 + 各 SKILL.md 决定动作。
#
# 运动学：笛卡尔走 piper_sdk EndPoseCtrl（固件解 IK）；反投影用 6-DoF eye-in-hand
# `T_base_cam = T_base_flange(EndPose) @ T_flange_cam`。
#
# 真机就位前务必校核：calib(piper_calib.json 的 T_flange_cam / object 锚点)、
# tool_offset_mm、工具朝下姿态(adapters/piper/api.py _TOOL_DOWN_RX/RY)。

env:
  cfg:
    low_level:
      # --- arm（单臂，左臂；命名 CAN 接口）
      can_port: "can_left"
      move_speed: 20                # 真机先慢，跑通再提
      tool_offset_mm: 95.0          # 法兰→指尖（真机实测夹爪长 ~9.5cm，2026-06-08）
      z_correction_mm: -57.0        # 检测Z高估~57mm(T_flange_cam初值未标定)，触碰标定得；下拉
      grasp_z_offset_mm: -25.0      # 检测顶面下方多少 mm 夹盒身；get_grasp_info_simple 据此给出确定化 grasp_z
      chip_thickness_mm: 75.0       # 叠放偏移=被抓盒指尖到底面距离；get_grasp_info_simple 给出 place_z=目标顶+此值

      # --- workspace
      calib_path: "piper_calib.json"   # 与本 yaml 同目录；T_flange_cam + 内参 + 锚点
      home_lift_mm: 250.0
      z_safe_margin_mm: -10.0
      home_use_init_pose: true         # 启动位姿 = 观察位（由操作者摆放）

      # --- cartesian 安全盒（mm；EndPoseCtrl 前钳制）
      x_min_mm: 0.0
      x_max_mm: 700.0
      y_min_mm: -500.0
      y_max_mm: 500.0
      z_max_mm: 800.0

      # --- gripper（平行夹爪；piper 支持宽度+力）
      gripper_open_mm: 90.0         # 真机确认：罩住黑盒需张到 ~90mm 才有容错
      gripper_effort: 1000             # 0.001 N·m 单位（=1 N·m）
      gripper_settle_s: 0.8

      # --- camera（腕部 RealSense）
      # camera_serial: "<your-camera-serial>"  # 替换为你的 RealSense 序列号，mock 模式无需设置
      camera_resolution: [640, 480]
      camera_fps: 30

    # 无 prompt/任务字段：任务不进 config，一律由 --query 或 --voice 在运行时给出。

api_servers:
  - _target_: jiuwensymbiosis.serving.grounding_dino_sam2_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1
    gdino_model_id: "IDEA-Research/grounding-dino-base"  # 替换成本地路径
    sam2_model_id: "facebook/sam2.1-hiera-large"         # 替换成本地路径
    box_threshold: 0.35
    text_threshold: 0.25
    use_sam2: true
model:
  provider: OpenAI
  api_base: "your own api"
  api_key: ""   # 用 --api-key 覆盖
  # 不用 VLM：视觉由 GroundingDINO+SAM2 工具(get_grasp_info_simple)完成，编排 LLM 只需原生工具调用。
  # Qwen3-VL 会把 tool_call 塞进 reasoning_content 导致不调工具。
  # 跑时配合 --no-visual-feedback（非 VLM）。
  model_name: "deepseek-ai/DeepSeek-V3.2"
  temperature: 0.3
  max_tokens: 2048

# agent（可选）：agent 行为开关，全部缺省即维持现状（trace/日志默认关闭）。
# 这里默认整段注释掉；想记录执行轨迹时，取消注释相关行即可，CLI 参数仍可覆盖。
agent:
  # log_level / log_dir: 由 build_robot_agent → configure_logging 统一接管。
  # log_dir 默认 "./logs"，框架日志落 logs/jiuwensymbiosis.log；
  log_level: INFO
  log_dir: ./logs
  # enable_tracing: true        # 开启 TraceRail，记录每轮工具调用到 traces/{run_token}.json
  # trace_save_frames: true     # 保存 JPEG 帧到 traces/frames/{run_token}/step_NNN.jpg
  # trace_console: true         # 运行时实时打印逐轮缩略图到 stderr
  # trace_max_entries: 200      # 最多记录步数（超出丢最旧）
  # trace_max_frames: 50        # 每次 invoke 最多保存帧数
  # # trace_dir: ./traces       # 覆盖 trace 目录（默认 <workspace>/traces）
  # # trace_capture_loggers: ["jiuwensymbiosis"]  # TraceLogHandler 捕获哪些 logger 的 WARNING+

